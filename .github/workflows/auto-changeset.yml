name: Auto Changeset

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  create-changeset:
    name: Generate changeset from PR title
    if: "${{ !startsWith(github.event.pull_request.title, 'chore: version packages') }}"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Generate changeset
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          BUMP="patch"
          if echo "$PR_TITLE" | grep -qE '^feat!:|^fix!:|BREAKING CHANGE'; then
            BUMP="major"
          elif echo "$PR_TITLE" | grep -qE '^feat(\(.+\))?:'; then
            BUMP="minor"
          fi

          CHANGED_FILES=$(git diff --name-only origin/main...HEAD)

          OPENCLAW_CHANGED=false
          SDK_CHANGED=false

          if echo "$CHANGED_FILES" | grep -q '^packages/openclaw/'; then
            OPENCLAW_CHANGED=true
          fi
          if echo "$CHANGED_FILES" | grep -q '^packages/sdk/'; then
            SDK_CHANGED=true
          fi

          if [ "$OPENCLAW_CHANGED" = "false" ] && [ "$SDK_CHANGED" = "false" ]; then
            OPENCLAW_CHANGED=true
          fi

          FRONTMATTER="---"
          if [ "$OPENCLAW_CHANGED" = "true" ]; then
            FRONTMATTER="$FRONTMATTER
          \"@zenzap-co/openclaw-plugin\": $BUMP"
          fi
          if [ "$SDK_CHANGED" = "true" ]; then
            FRONTMATTER="$FRONTMATTER
          \"@zenzap-co/sdk\": $BUMP"
          fi
          FRONTMATTER="$FRONTMATTER
          ---"

          DESCRIPTION=$(echo "$PR_TITLE" | sed 's/^[a-z]*!*([^)]*): //' | sed 's/^[a-z]*!*: //')

          CHANGESET_ID="pr-${PR_NUMBER}"
          CHANGESET_FILE=".changeset/${CHANGESET_ID}.md"

          cat > "$CHANGESET_FILE" << EOF
          $FRONTMATTER

          $DESCRIPTION
          EOF

          echo "Created $CHANGESET_FILE (bump: $BUMP)"
          cat "$CHANGESET_FILE"

      - name: Commit changeset to PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .changeset/
          git diff --staged --quiet && echo "Changeset already up to date" && exit 0
          git commit -m "chore: auto-generate changeset"
          git push
