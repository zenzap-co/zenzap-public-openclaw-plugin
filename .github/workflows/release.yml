name: Release

on:
  workflow_dispatch:
    inputs:
      type:
        description: "Release type"
        required: true
        type: choice
        options:
          - dev
          - stable
      stable_bump:
        description: "Stable release bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
  pull_request:
    types:
      - closed
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Create stable release PR
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.type == 'stable' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          token: ${{ secrets.RELEASE_PAT != '' && secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install

      - name: Build SDK
        run: pnpm --filter @zenzap-co/sdk run build

      - name: Run tests
        run: pnpm --filter @zenzap-co/openclaw-plugin run test

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump stable version
        working-directory: packages/openclaw
        run: npm version "${{ github.event.inputs.stable_bump }}" --no-git-tag-version --ignore-scripts

      - name: Read release version
        id: release_version
        run: echo "version=$(node -p \"require('./packages/openclaw/package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Create release pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.RELEASE_PAT != '' && secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          commit-message: chore: release v${{ steps.release_version.outputs.version }}
          branch: release/v${{ steps.release_version.outputs.version }}
          delete-branch: true
          title: chore: release v${{ steps.release_version.outputs.version }}
          body: |
            Automated stable release PR for `@zenzap-co/openclaw-plugin`.

            - Bump type: `${{ github.event.inputs.stable_bump }}`
            - Version: `v${{ steps.release_version.outputs.version }}`
          base: main
          add-paths: |
            packages/openclaw/package.json

  publish-stable:
    name: Publish stable package
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          token: ${{ secrets.RELEASE_PAT != '' && secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install

      - name: Build SDK
        run: pnpm --filter @zenzap-co/sdk run build

      - name: Run tests
        run: pnpm --filter @zenzap-co/openclaw-plugin run test

      - name: Read release version
        id: merged_release_version
        run: echo "version=$(node -p \"require('./packages/openclaw/package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        run: git tag "v${{ steps.merged_release_version.outputs.version }}"

      - name: Push release tag
        run: git push origin "v${{ steps.merged_release_version.outputs.version }}"

      - name: Publish stable package
        run: pnpm publish --access public --no-git-checks
        working-directory: packages/openclaw
        env:
          NPM_CONFIG_PROVENANCE: "false"

  publish-dev:
    name: Publish dev snapshot
    if: ${{ github.event.inputs.type == 'dev' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install

      - name: Build SDK
        run: pnpm --filter @zenzap-co/sdk run build

      - name: Run tests
        run: pnpm --filter @zenzap-co/openclaw-plugin run test

      - name: Stamp dev version
        run: |
          SHA=$(git rev-parse --short HEAD)
          BASE=$(node -p "require('./packages/openclaw/package.json').version")
          pnpm --filter @zenzap-co/openclaw-plugin exec \
            npm version "${BASE}-dev.${SHA}" --no-git-tag-version --ignore-scripts

      - name: Publish dev snapshot
        run: pnpm publish --tag dev --access public --no-git-checks
        working-directory: packages/openclaw
